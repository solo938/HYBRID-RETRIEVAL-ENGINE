name: RAG Evaluation Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create minimal golden dataset for CI
        run: |
          python -c "
import json
from pathlib import Path
Path('app/evaluation/datasets/goldens/eval_splits').mkdir(parents=True, exist_ok=True)
# Create minimal test data if not exists
if not Path('app/evaluation/datasets/goldens/questions.json').exists():
    with open('app/evaluation/datasets/goldens/questions.json', 'w') as f:
        json.dump([], f)
"

      - name: Run evaluation quality gate
        run: python .github/scripts/eval_gate.py

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: app/evaluation/datasets/goldens/eval_results_ci.json
