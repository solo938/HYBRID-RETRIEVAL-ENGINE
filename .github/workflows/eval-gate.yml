name: RAG Evaluation Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy sentence-transformers scikit-learn

      - name: Create golden dataset for CI
        run: |
          python -c "
import json
from pathlib import Path

# Create directories
Path('app/evaluation/datasets/goldens/eval_splits').mkdir(parents=True, exist_ok=True)

# Create questions.json
questions = [
    {
        'id': 'test_001',
        'text': 'What is Retrieval-Augmented Generation?',
        'context': 'Retrieval-Augmented Generation (RAG) is a technique that combines information retrieval with text generation to produce more accurate and grounded responses.',
        'domain': 'test'
    }
]
with open('app/evaluation/datasets/goldens/questions.json', 'w') as f:
    json.dump(questions, f, indent=2)

# Create relevant_docs.json
relevant = [
    {
        'query_id': 'test_001',
        'chunk_ids': ['test_001'],
        'document_ids': ['test_001']
    }
]
with open('app/evaluation/datasets/goldens/relevant_docs.json', 'w') as f:
    json.dump(relevant, f, indent=2)

# Create eval split
eval_queries = [
    {
        'id': 'test_001',
        'text': 'What is Retrieval-Augmented Generation?',
        'domain': 'test'
    }
]
with open('app/evaluation/datasets/goldens/eval_splits/retrieval_eval_dev.json', 'w') as f:
    json.dump(eval_queries, f, indent=2)

print('✅ Golden dataset created with 1 test query')
"

      - name: Run evaluation quality gate
        run: python .github/scripts/eval_gate.py

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: app/evaluation/datasets/goldens/eval_results_ci.json
