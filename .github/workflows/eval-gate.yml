name: RAG Evaluation Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy sentence-transformers scikit-learn

      - name: Create golden dataset
        run: |
          mkdir -p app/evaluation/datasets/goldens/eval_splits
          echo '[{"id": "test_001", "text": "What is RAG?", "context": "RAG is Retrieval Augmented Generation."}]' > app/evaluation/datasets/goldens/questions.json
          echo '[{"query_id": "test_001", "chunk_ids": ["test_001"]}]' > app/evaluation/datasets/goldens/relevant_docs.json
          echo '[{"id": "test_001", "text": "What is RAG?"}]' > app/evaluation/datasets/goldens/eval_splits/retrieval_eval_dev.json

      - name: Run evaluation gate
        run: python .github/scripts/eval_gate.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: app/evaluation/datasets/goldens/eval_results_ci.json
